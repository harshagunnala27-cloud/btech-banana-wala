<!DOCTYPE html>
<html>
<head>
    <title>BTech Banana Wala</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="top-bar">
        <h1>BTech Banana Wala 🍌</h1>

        <a href="/logout">Logout</a>
    </div>

    <button onclick="toggleDarkMode()" class="dark-btn">
        Dark Mode
    </button>

    <form method="POST">

        <div class="products">

            {% for code, item in products.items() %}

            <div class="card">

                <h2>{{ item.name }}</h2>

                <p>₹{{ item.price }}</p>

                <input type="number"
                       name="qty_{{ code }}"
                       min="0"
                       placeholder="Qty">

            </div>

            {% endfor %}

        </div>

        <button type="submit" class="checkout-btn">
            Add To Cart
        </button>

    </form>

    <div class="cart">

        <h2>Cart</h2>

        {% for item in cart_items %}

        <div class="cart-item">

            <p>{{ item.name }}</p>

            <p>{{ item.quantity }}</p>

            <p>₹{{ item.total }}</p>

        </div>

        {% endfor %}

        <hr>

        <h3>Subtotal: ₹{{ subtotal }}</h3>

        <h3>GST: ₹{{ gst }}</h3>

        <h2>Total: ₹{{ final_amount }}</h2>

        <a href="/payment">
            <button class="pay-btn">
                Proceed To Payment
            </button>
        </a>

    </div>

</div>

<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
